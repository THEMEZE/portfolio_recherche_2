            <p>

            <p>

<script>
  function initDocs() {
    $("#docs li.folder").addClass("closed");

    $("#docs li.folder > strong").wrap('<a href="#"></a>');
  }

  function buildTree(nodes, parent) {
    nodes.forEach((node) => {
      const li = document.createElement("li");

      if (node.type === "folder") {
        li.className = "folder";

        const strong = document.createElement("strong");
        strong.textContent = node.name;

        const ul = document.createElement("ul");

        li.appendChild(strong);
        li.appendChild(ul);

        parent.appendChild(li);

        buildTree(node.children, ul);
      } else {
        li.className = "document";

        const a = document.createElement("a");
        a.href = node.path;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = node.name;

        li.appendChild(a);

        parent.appendChild(li);
      }
    });
  }

  async function loadDocs() {
    const res = await fetch("docs.json");
    const data = await res.json();

    const container = document.querySelector("#docs ul");

    container.innerHTML = "";

    buildTree(data, container);

    initDocs(); // initialise les dossiers
  }

  $(document).ready(function () {
    $("#docs").on("click", "li.folder > a", function (e) {
      e.preventDefault();

      $(this).parent().toggleClass("closed");
    });

    loadDocs();
  });
</script>
